<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boring Portfolio — Free Online Tools & Calculators</title>
<meta name="description" content="A collection of 100+ free online tools, calculators, converters, and utilities. All tools are free, no signup required.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #0d1117;
      --bg-secondary:  #161b22;
      --bg-tertiary:   #21262d;
      --border:        #30363d;
      --border-hover:  #484f58;
      --text-primary:  #e6edf3;
      --text-secondary:#8b949e;
      --text-muted:    #6e7681;
      --accent:        #58a6ff;
      --accent-green:  #3fb950;
      --accent-yellow: #d29922;
      --accent-red:    #f85149;
      --accent-purple: #bc8cff;
      --radius-sm:     6px;
      --radius-md:     8px;
      --radius-lg:     12px;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .wrapper {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
    }

    /* ── Header ──────────────────────────────────────────────────────── */
    .site-header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
    }

    .site-header .wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .site-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .site-header h1 .logo-dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent-green);
      flex-shrink: 0;
    }

    .site-header .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .site-header .subtitle span {
      color: var(--text-muted);
    }

    /* ── Stats bar ────────────────────────────────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 32px 0;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color .2s;
    }

    .stat-card:hover { border-color: var(--border-hover); }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .stat-card.total    .stat-value { color: var(--accent); }
    .stat-card.live     .stat-value { color: var(--accent-green); }
    .stat-card.planned  .stat-value { color: var(--accent-yellow); }

    /* ── Table ────────────────────────────────────────────────────────── */
    .table-section {
      padding: 8px 0 48px;
    }

    .table-section .wrapper {
      overflow-x: auto;
    }

    .table-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .table-controls h2 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3px;
    }

    .filter-tab {
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all .2s;
    }

    .filter-tab:hover { color: var(--text-primary); }
    .filter-tab.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    thead {
      background: var(--bg-tertiary);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 14px 16px;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(88,166,255,0.04); }

    /* ── Table columns ────────────────────────────────────────────────── */
    .col-name {
      font-weight: 600;
      white-space: nowrap;
    }

    .col-name .sub-name {
      display: block;
      font-weight: 400;
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-badge::before {
      content: '';
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-badge.live {
      background: rgba(63,185,80,0.12);
      color: var(--accent-green);
    }
    .status-badge.live::before { background: var(--accent-green); }

    .status-badge.planned {
      background: rgba(210,153,34,0.12);
      color: var(--accent-yellow);
    }
    .status-badge.planned::before { background: var(--accent-yellow); }

    .status-badge.broken {
      background: rgba(248,81,73,0.12);
      color: var(--accent-red);
    }
    .status-badge.broken::before { background: var(--accent-red); }

    .col-description {
      color: var(--text-secondary);
      max-width: 340px;
    }

    .col-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      word-break: break-all;
    }

    .col-url a {
      color: var(--accent);
      font-weight: 500;
    }
    .col-url a:hover {
      color: #79c0ff;
      text-decoration: underline;
    }

    .col-url .placeholder-url {
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Footer ────────────────────────────────────────────────────────── */
    .site-footer {
      margin-top: auto;
      padding: 24px 0;
      border-top: 1px solid var(--border);
    }

    .site-footer .wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .site-footer p {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .site-footer .build-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .build-info .bot-icon {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--accent-purple);
      opacity: 0.7;
    }

    .site-footer .meta-links {
      display: flex;
      gap: 16px;
    }

    .site-footer .meta-links a {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    .site-footer .meta-links a:hover { color: var(--accent); }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .stats-bar { gap: 12px; }
      .stat-card { padding: 18px; }
      .stat-value { font-size: 1.625rem; }

      td, th { padding: 10px 12px; }
      .col-description { max-width: 220px; }
    }

    @media (max-width: 700px) {
      .site-header { padding: 32px 0 24px; }
      .site-header h1 { font-size: 1.5rem; }

      .stats-bar {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 20px 0;
      }

      .stat-card {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
      }
      .stat-value { font-size: 1.375rem; }

      .table-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-tabs { align-self: flex-start; }

      table { font-size: 0.8125rem; }

      /* stack table on small screens */
      table, thead, tbody, tr, th, td { display: block; }

      thead { display: none; }

      tr {
        padding: 14px 12px;
        border-bottom: 1px solid var(--border);
      }
      tr:last-child { border-bottom: none; }

      td {
        padding: 4px 0;
        border: none;
        display: flex;
        align-items: baseline;
        gap: 8px;
      }

      td::before {
        content: attr(data-label);
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        min-width: 85px;
        flex-shrink: 0;
      }

      .col-description { max-width: none; }

      .site-footer .wrapper {
        flex-direction: column;
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      .wrapper { padding: 0 16px; }
      .site-header h1 { font-size: 1.25rem; flex-wrap: wrap; }
    }
  </style>

    // ── Render ────────────────────────────────────────────────────────
    function renderTable(filter = 'all') {
      const tbody = document.getElementById('table-body');
      const filtered = filter === 'all'
        ? sites
        : sites.filter(s => s.status === filter);

      tbody.innerHTML = filtered.map(s => {
        const statusLabel = s.status.charAt(0).toUpperCase() + s.status.slice(1);

        let urlCell;
        if (s.url) {
          const href = s.url.startsWith('http') ? s.url : s.url;
          urlCell = `<a href="${s.url}" target="_blank" rel="noopener">${s.url}</a>`;
        } else {
          urlCell = `<span class="placeholder-url">TBD</span>`;
        }

        const subHtml = s.sub
          ? `<span class="sub-name">${s.sub}</span>`
          : '';

        return `<tr data-status="${s.status}">
          <td class="col-name" data-label="Name">${s.name}${subHtml}</td>
          <td data-label="Status"><span class="status-badge ${s.status}">${statusLabel}</span></td>
          <td class="col-description" data-label="Description">${s.desc}</td>
          <td class="col-url" data-label="URL">${urlCell}</td>
        </tr>`;
      }).join('');
    }

    // ── Stats ─────────────────────────────────────────────────────────
    function updateStats() {
      const total = sites.length;
      const live = sites.filter(s => s.status === 'live').length;
      const planned = sites.filter(s => s.status === 'planned').length;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-live').textContent  = live;
      document.getElementById('stat-planned').textContent = planned;
    }

    // ── Filters ──────────────────────────────────────────────────────
    function setFilter(filter) {
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.filter === filter);
      });
      renderTable(filter);
    }

    function resetFilter() {
      setFilter('all');
      document.querySelector('.filter-tab[data-filter="all"]')?.scrollIntoView({ behavior: 'smooth' });
    }

    document.getElementById('filter-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (tab) setFilter(tab.dataset.filter);
    });

    // ── Init ──────────────────────────────────────────────────────────
    updateStats();
    renderTable('all');
  </script>
